services:
  - type: web
    name: trading-journal-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: trading_journal_super_secret_key_2024_qazqwerty
      - key: ENCRYPTION_KEY
        value: TJ_encrypt_key_32chars_qazqwerty
      - key: DATABASE_URL
        fromDatabase:
          name: trading-journal-db
          property: connectionString

databases:
  - name: trading-journal-db
    region: oregon
    plan: free
    databaseName: trading_journal
    user: trading_journal_user
